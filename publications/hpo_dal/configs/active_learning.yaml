defaults:
  - dataset: cifar10

random_seed: 1
experiment_name: al
mlflow_uri: sqlite:///hpo_dal.db

al:
  strategy: random
  device: cpu

model:
  name: linear
  num_epochs: 200
  train_batch_size: 64
  predict_batch_size: 128
  mean_field_factor: 0.4
  mc_samples: 10_000
  backbone: dinov2

optimizer: 
  name: SGD
  lr: 1e-2
  weight_decay: 5e-4
  momentum: 0.9
  nesterov: True

output_dir: ./output/
hydra:
  run:
    dir: ${output_dir}
  job_logging:
    handlers:
      file:
        mode: w
