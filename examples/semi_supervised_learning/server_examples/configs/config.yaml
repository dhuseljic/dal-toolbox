defaults:
  - model: resnet18
  - ssl_algorithm: pseudo_labels

dataset: CIFAR10
num_labeled: 40
num_unlabeled: 50000
val_interval: 1
random_seed: 42
fast_dev_run: False

output_dir: ./output/
data_dir: ./data/

hydra:
  run:
    dir: ${output_dir}
  job_logging:
    handlers:
      file:
        mode: w
