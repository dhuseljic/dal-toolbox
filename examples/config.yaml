random_seed: 42

dataset_path: /home/phahn/datasets
output_path: ./output/
imagenet_path: /mnt/datasets/imagenet/ILSVRC2012/

dataset_name: cifar10
cache_features: True
feature_cache_dir: null
model_cache_dir: null
num_workers: 0

dino_model_name: 'dinov2_vits14' # 21 M params - 384 dimensions

al:
  strategy: random
  subset_size: 1000
  num_init: 10
  acq_size: 10
  num_acq: 20
  device: cpu

model:
  num_epochs: 200
  train_batch_size: 64
  predict_batch_size: 128
  mean_field_factor: 0.4
  mc_samples: 10_000

optimizer: 
  lr: 1e-2
  weight_decay: 5e-4

hydra:
  run:
    dir: ${output_path}
  job_logging:
    handlers:
      file:
        mode: w