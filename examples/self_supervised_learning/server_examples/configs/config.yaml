defaults:
  - _self_
  - model: resnet18

dataset: CIFAR10
val_interval: 5

device: cuda
random_seed: 42
print_freq_eval: 100
print_freq_train: 100

load_pretrained_weights: False
pretrained_weights_path: ./model/pretrained_weights.pth
subset_size: null

output_dir: ./output/
data_dir: ./data/
model_dir: ./model/
hydra:
  run:
    dir: ${output_dir}
  job_logging:
    handlers:
      file:
        mode: w
