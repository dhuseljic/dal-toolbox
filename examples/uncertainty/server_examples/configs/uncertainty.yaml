defaults:
  - _self_
  - model: 'deterministic'

dataset: CIFAR10 
ood_datasets: [SVHN, CIFAR100]
val_interval: 20
val_split: 0

random_seed: 42
num_devices: 1

# Define output dir
output_dir: "./output/"
data_dir: "./data/"
hydra:
  run:
    dir: ${output_dir}
  job_logging:
    handlers:
      file:
        mode: w